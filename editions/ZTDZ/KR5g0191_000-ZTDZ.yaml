  text: 上清九丹上化胎精中記經九天瓊胎靈曜旣八
  hash: sha256:a3f9b616ab1bae02a78db1db976f70e9289d4ff14f7ff139ec93ed79b65a6963
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0191_SJB_000-340082a, image: sjb/34/340082a.png}
body:
  text: 上化九丹陽靈之符胎精錬神之符三關十二結胞胎内符九丹流精保命之符九丹上化之文太微帝君授於三天玉童乃上化九轉廻精凝神解散紫胞結節之根還精哺飴靈鎮窮腸内充外溢九竅鮮明錬髓易骨節節納眞其法髙妙祕於九天金房玉室靈都之宫依四極明科萬劫一傳自無玄名紫簡緑字上清不得叅聞有犯靈禁伐以神兵宻修道感白日飛仙九天丈人告三天玉童天地交運二象合眞隂陽降氣上應九玄流丹九轉結氣爲精精化成神神變成人故人象天地氣法自然自然之氣皆九天之精化爲人身含胎育養九月氣盈九天氣普十月乃生其結胎受化有吉有㐫有夀有夭有短有長皆禀宿根結氣不純藏胃積滯六府敗傷形神不固體不受靈死氣入竅何由得存徒知修學不識此源今以相告一形之眞隨生解結哺養百神體自生光内府鮮明神安宫宅萬氣並仙子其祕之愼勿輕宣凡人受生結九丹上化於胞胎之中法九天之氣氣滿神具便於胞囊之内而自識其宿命知有本根轉輪因縁九天之劫化成其身旣覩陽道開曠三光而自忘其所生所由之因爾者皆由胞根結滯盤固三關五府不理死氣塞門致靈關不發而忘其因縁也若靈眞託化含鍊瓊胎暫經紫户運履人道挺秀自然曜景覩靈便騰身九天非復結精受氣而爲人也凡修學之家仰希神仙當知錬身於九丹觧結於五神引氣於本生滅根於三門九鍊十變百節開明㫁滅胞結乃知本眞旣知本眞便成上仙學無此法三宫不聦死氣不滅胃不受靈氣離神遊赤子不歡宫宅空廢邪魔入身所以百痾從此而生死不盡命痛胡可言陽氣赤名曰玄丹隂氣黄名曰黄精隂陽交二氣降精化神結上應九天九天之氣則下布丹田與精合凝結㑹命門要須九過是爲九丹上化下凝以成於人一月受氣二月受靈三月含變四月凝精五月體首具六月化形七月神位布八月九孔明九月九天氣普乃有音聲十月司命勒籍受命而生故人禀九天之氣隂陽之精名曰九丹合成人身旣得爲人便應返其本眞通理五藏觧散胞根㫁滅死孔自然成仙也凡人生在胞胎之中皆禀九天之氣凝精以自成人也旣生而胞中有十二結節盤固五内五内滯閡結不可解節不可滅故人之病由於節滯也人之命絶由於結固也兆能觧於胞中十二結節則求死亦不得也胞上部有四結一結在泥丸中二結在口中三結在頰中四結在目中欲解上部四結當以本命之日平旦入室燒香向西北九拜朝九天元父叩齒九通三呼元父諱遵廻向東南三拜三呼九天玄母諱沌還向本命平坐閉眼思元父身長九寸九分著玄黄素靈之綬頭戴九稱珠玉之幘無極進賢之冠居九天之上太極瓊宫玉寳之府丹靈郷洞元里中乗碧霞飛輿從十二飛龍二十四仙人從西北來下入我身中治泥丸之境次思玄母身長六寸六分著青寳神光錦繡霜羅九色之綬頭戴紫元玄黄寳冠居九氣无極之上瓊林七暎丹房玉寳洞元之府九光郷上清里中乗紫雲飛精羽蓋從十二鳯凰三十六玉女從東南來下入甲身中治面洞房之内思父母化爲青黄二氣宛轉相沓競於頭面之上畢叩齒九通微祝曰甲受九靈之化結氣不純節滯盤固鎮塞靈門謹以本命上告髙晨元父玄母下暎我身八景齊暉九天同眞共解上部四結胞根廻靈鎭戸九孔結仙内胎鍊化九丹凝神變青爲赤二氣纒綿夀同三光永享億年畢咽氣八十一過止因又思鬱單无量天王姓混諱霜衣九色無縫自然斑文之裘頭戴耀精日圎之冠治天無央玄臺紫戸之内乗九麟瓊輪從玉仙二十四人次思上上禪善無量夀天王姓禊諱衣九色雲文之裘頭戴暉精月光之冠治天王國朱林七寳瓊臺乗十二玄龜飛青羽蓋從上宫太仙玉童三十二人次思須延天王姓滓諱衣九色三法雲文之裘頭戴天元玉寳明冠治天玉京靈都宫乗九色飛鴻三素飛雲從素靈玉女二十四人次思三天眞王共下我身頭面之上化爲青紫黄三氣混沌如雲之沓從口耳鼻孔之中而入直帀一面便仰祝曰三天大王九玄靈仙爲我上解頭面之關結化九丹自然降精金門之上交合三眞之雲降流我身以成我神盪去死氣滅絶胞根靈景鎭固棄諸㐫患結結得解節節納眞玄光流布洞灌幽泉言名九天返胎化仙内充外盈表裏成神畢仰咽氣九過止又思上部八景神童閉眼存腦神名覺元子字道都形長一寸一分著白錦之衣頭戴三梁寳冠𩬊神名玄父華字道衡形長二寸一分衣玄雲錦衣頭戴无極進賢之冠皮膚神名通衆仲字道連形長一寸五分衣黄錦飛裙頭戴三氣寳天冠目神名虚監生字道童形長三寸衣五色章衣頭戴通天之冠項髓神名靈謨盖字道周形長五寸衣白錦素裙頭戴三梁寳冠膂神名益歴輔字道柱形長三寸五分衣白玉柔衣頭戴玄元寳冠鼻神名冲龍玉字道微形長二寸五分衣青黄素錦飛裙頭戴逺遊之冠舌神名始梁峙字道歧形長七寸着絳錦飛裙頭戴進賢之冠八景都竟並如嬰兒之形一合在面部之上各安其所乃叩齒八通微祝曰上景一部八神合眞結氣九丹化成我身千乗萬騎如雲散煙降帀頭面施靈布神上解結節中滅胞根下除固滯通理三關八景翼衛與靈同年帝君玄母曲廻髙晨降我玉華停我落鮮返容朱顔面化金仙變景逐電逕造日門畢仰咽八氣都止便服上化九丹陽靈之符上化九丹陽靈之符朱書青紙上三枚日正中向本命上叩齒九通微祝曰上化九炁變鍊百神内理六宫外降太仙玄母陶津觧結散滯㫁滅胞根體輕肉飛應氣自然與氣同昇上到帝前畢服符九咽都止右上部之結在頭面之境常以本命之日平旦入室靜思眞靈解結散節斷滅胞根服液咽氣御陽靈之符通理三宫如此三年體休氣壯骨輕肉強乘空飛行出入无間九年通靈與神共言降致雲輿昇入帝晨祕化之道慎宣非眞明科禁重殃累七玄惟在宻修尅成上仙胞中部有四結一結在五藏中二結在太倉中三結在大腸中四結在小腸中兆欲解中部四結以本命之日正中午時入室燒香向西北九拜朝元父三呼元父諱遵迴轉東南三拜朝玄母三呼玄母諱沌還向行年上平坐叩齒九通閉眼思元父身長九寸九分著玄黄素靈之綬頭戴七稱珠玉之幘無極進賢之冠居九天之上太極瓊宫玉寳之府丹靈郷洞元里中乘碧霞飛輿從十二飛龍二十四仙人從西北來下入某身中五藏之内次又思玄母身長六寸六分著青寳神光錦繡霜羅九色之綬頭戴紫元玄黄寳冠居九氣无極之上瓊林七映丹房玉寳洞元之府九光郷上清里中乘紫雲飛精羽蓋從十二鳳凰三十六玉女從東南來下入我五藏之中思父母化爲青黄二氣混沌如日之圎映照五藏光曜内外便仰祝曰父靈母精二氣齊并九丹凝化結胎紫瓊禀景太㣲命統九靈帝君敷神流眞灌生五藏結絡六府洞清胃管開聦九竅朗明宿節散滅新胎更榮變景錬體冠帶九星三暉翼部飛入帝庭畢咽四十五氣止又思寂然天王姓津諱衣七色龍文通光之裘頭戴隂精夜光治天朱宫瓊臺之上乘八景飛輪從玉仙十二人次思不驕樂天王姓凝諱衣九色飛霜雲文斑裘頭戴青華嵗星玄精之冠治天元宫映丹之房九層玉臺乘白鹿丹霞之輿從上宫玉仙二十六人次思化應聲天王姓耀諱衣九色流光耀雲錦裘頭戴白光太白玉精之冠治天瓊林上宫朱映之房乗飛鳳遊霄紫輪從太眞玉仙三十六人次思三天眞王共下入我身五藏之内化爲赤白皁三色之氣混沌如雲之煙從心孔而入直帀五内便㣲祝曰九丹凝霄三氣結纏玄眞充降内外明鮮太倉閉通腸胃結仙斷滅節莖散除宿根三合成契九化凝神逥精玉胞以成我身九色玄黄流精灌津盪洗積滯内无滓塵華條合秀種植靈根孔孔洞朗節節冷然骨化景飛上昇紫天畢仰咽九氣止又思中部八景神童開眼存呼喉神名百流放字道通形長八寸著九色章衣頭戴平天紫晨之冠肺神名素靈生字道平形長八寸一分著白錦飛雲之衣頭戴九元寳冠心神名煥陽昌字道明形長九寸箸絳章單衣頭戴玉晨寳天冠肝神名開君童字道青形長七寸衣飛青羽裙頭戴三梁之冠膽神名龍德拘字道放形長三寸六分衣青黄緑三色之裙頭戴无極進賢之冠左賢神名春元眞字道卿形長三寸七分著五色變光之裙頭戴遠遊之冠右賢神名象他无字道生形長三寸五分衣白錦單衣頭戴三氣寳光之冠脾神名寳元全字道騫形長七寸三分著黄錦飛裙頭戴紫晨之冠八景都竟並如嬰兒之形一合在五藏之内各安其所仍叩齒八通仰祝曰中部八景上變九逥化精玉胞結氣紫㣲錬魂固魄萬神總歸帝君解結九孔散開玄母降靈節節納暉内充外盈華光无衰得與八景合輦同飛本命告始如兆所逥運我上昇披觀靈扉畢仰咽八氣止便服胎精錬神之符胎精錬神之符黄書白紙上三枚日正中向行年上叩齒九通㣲祝曰玄炁結精隂化陽生九轉八景得乗流軿下降兆身通神鎮靈解節散結四縳豁清九孔開張萬氣普寧乗空飛景上入太清畢服符九咽液都止右中部四結在五藏之中常以本命之日平旦解上結正中解中結㫁滅胞根服靈液御神符咽元氣通神廬如此三年靈氣有餘九年積感與神同輿飛行太空昇入帝廬髙上妙法道爲不虚至學求仙深祕此書胞下部有四結一結在膀胱中二結在隂中三結在後門中四結在兩足中兆欲解下部四結以本命之日夜半子時生氣始入室燒香向西北九拜朝元父三呼元父諱遵逥轉向東南三拜朝玄母三呼玄母諱沌還向太嵗上平坐叩齒九通閉眼思元父身長九寸九分著玄黄素靈之綬頭戴七稱珠玉之幘无極進賢之冠居九天之上太極瓊宫玉寳之府丹靈郷洞元里中乘碧霞飛輿從十二飛龍二十四仙人從西北來下入某身中五藏膀胱之内次思玄母身長六寸六分著青寳神光錦繡霜羅九色之綬頭戴紫元玄黄寳冠居九氣无極之上瓊林七映丹房玉寳洞元之府九光郷上清里中乗紫雲飛精羽蓋從十二鳳凰三十六玉女從東南來下入我膀胱之内下至兩足中思父母化爲青黄二氣混沌如日之圎映照一身光耀内外便仰祝曰隂陽交泰二氣洞明上化玄丹下轉黄精含胎變化體無常形帝君監映九孔納靈十二部結散滅黄庭八景纏絡胃結紫瓊三魂被錬七魄安寧萬神寳鎭内外齊平三部八景與我俱生運我飛昇上造玉清畢咽二十四氣止又思梵寳天王姓精諱霧雲衣九色流雲飛晨之裘頭戴流丹絳寳熒星玄精之冠治天南上七映之宫乗流霞丹霄瓊輿羽蓋從上宫玉仙十二人次思梵摩迦夷天王姓玄諱霐衣九色元鳳飛雲之裘頭戴玄晨辰星流精之冠治天九玄鳳城紫瓊玉臺乘白麟素雲飛輪從太華仙童三十二人次思波梨答惒天王姓玉諱靈衣九色无縫玄雲寳裘頭戴無極流黄塡星飛精之冠治天陵層玉京大有妙宫九曲之房乘五色雲輿從太玄玉童十二人次思三天眞王共下降我身治膀胱之中下至兩足化爲紫緑碧三色之氣混沌如雲霧從隂中而入流布膀胱後門兩足之中内外映照便祝曰三天育胎九氣結神上化玄丹下轉變仙二象交降以成我身六胃瓊秀九府納眞十二結節各各絶根盪除穢氣五靈敷陳玄母吐精錬化光鮮金仙翼靈玉華結篇記名青宫長侍帝晨畢仰咽九氣止又思下部八景神童閉眼存呼胃神名同朱育字道展形長七寸衣黄錦飛裙頭戴平天紫晨之冠窮腸中神名兆騰康字道還形長二寸四分衣絳章單衣頭戴三梁之冠大小腸中神名蓬送留字道厨形長二寸一分衣黄絳飛裙頭戴玉晨寳天冠胴中神名受享勃字道虚形長九寸一分衣九色章衣頭戴飛晨玉冠胷膈中神名廣瑛宅字道冲形長五寸衣白錦飛裙頭戴无極進賢之冠兩脅神名辟假馬字道成形長四寸一分衣赤白二色之裙頭戴九元寳冠左隂右陽中神名扶流起字道圭形長二寸三分衣青黄白三色之裙頭戴遠遊之冠右隂左陽中神名苞表明字道生形長二寸三分衣青黄白三色之裙頭戴三梁之冠存八景都畢並如嬰兒之狀各安所在千乗萬騎帀布在我隂中膀胱後門兩足之中仍叩齒八通仰祝曰下部八景散形變神含元育氣錬胎紫煙太一元父玄母交纏二精流灌含養内眞帝君定籍司命攺年節結已散九孔巳鮮魂魄保固總攝萬神與我同昇俱造玉晨畢仰咽液八過止又思道一内神名逮无馬字道極生形長二寸二分衣紫文明光錦裙頭戴无極進賢之冠在兆臍下丹田之中總統三部二十四眞叩齒三十二通微祝曰玄上大神總領無外安鎮幽谷流精紫蓋衆眞侍靈三部交衛帝君映席玄母歡奉九元同符司命延邁三晨齊暉與眞結帶畢仰咽二十四氣都止便服三關十二結胞胎内符三關十二結胞胎内符右朱書竹膜上三枚存思都畢向太歳上服之㣲祝曰上部四結固人泥丸落人華容夭人生繁中部四結合㐫爲群盤固太倉迅人遊魂來祅通姦景夢不專下部四結結人後門遏人九孔㫁人命根帝君告靈九天五文消解結節滅諸根源元父玄母育養三關八景鎭備眞氣散分上清下黄外方内圎表裏齊清降致三元得乘八景飛霄流雲騰空駕虚上造金門畢仰咽十二氣咽二十四過都止本命日平旦正中夜半三時解三部十二結節八節日亦應行之以兼其速求仙之近也八節修行亦同三時之存思也行之三年面生玉光體映金眞肉消骨輕内化結仙九年靈降白日昇天學无此法徒勞精勤死結不散盤滯日纏神氣不布祅邪入身遊魂飛散何由得仙有心至士熟尋此源三時解結剋獲上仙返胎瓊秀三關納眞三部八景二十四神千乘萬騎同御紫煙髙上妙化玉帝靈篇妄傳輕泄殃及七玄死魂充責長没河源巳身負考三塗五苦萬劫不原學者愼之祕識此言二景之神皆九天化生之精神也元父上化玄母結胎九天育養以成於人二十四人各備靈關兆欲修學不知存念其形則神遊氣散死氣結沈祅魔入景促命夭年若知修行解散三關神安宫宅靈鎭玉門結節自消死氣自亡萬神齊景則白日昇天凡人生皆禀九天之氣氣凝爲精精化成丹丹變成人結胎含孕法於自然旣得爲人當還哺養本眞使精溢六府氣降神庭内外光鮮與眞同靈此法髙妙不傳下仙修得其道返白停年夀齊三景天地相傾妄泄其要考切爾身凡上學之士莫不先解身中三關之結解結之道又當常以結胎之月哺養本元令死節沈消九眞鎮靈眞氣既降則自長生氣像相應則不學而成行此道假令七月生則十月胎十月胎則受波梨答惒天之氣當以十月一日平旦十一日正中二十一日夜半一月三日三時香湯沐浴燒香依其日時入室向西北九拜朝九天元父東南三拜朝九天玄母還向月建平坐叩齒三十六通閉眼思波梨答惒天王姓玉諱靈衣九色無縫玄雲寳裘頭戴无極流黄塡星飛精之冠乘五色雲輿從太玄玉童十二人來下入兆身中鎮泥丸宫存見碧色之雲鬱鬱冠布兆身良乆仍口引雲氣九咽㣲祝曰玄元布氣陽道開通二象交降青黄相從上化九丹凝精三宫形法自然氣法太空帝君鎭靈玄母守房萬神安定六胃内昌九天冠帶三景垂光五眞輔翼返身空洞乘虚駕浮上昇帝堂畢又咽氣九過咽液二十四過止如此則九天之氣哺飼於身結胎之時滯積結節則不得又生於三關也行之三年逆知萬里之事吉㐫之兆此以關節受眞孔竅開聦故也十一月受梵摩迦夷天之氣當以其月二日平旦十二日正中二十二日夜半一月三日三時香湯沐浴燒香入室西北九拜朝元父東南三拜朝玄母還向月建平坐叩齒三十六通閉眼存呼梵摩迦夷天王姓玄諱霐衣九色元鳳飛雲之裘頭戴玄晨辰星流精之冠乘白麟素雲飛輪從太華仙童三十二人來下入兆身洞房之中存見緑色之雲氣鬱鬱冠帀兆形良乆仍口引雲氣九咽㣲祝曰九天流丹上化結精元父注氣玄毋納靈五華散景三眞混并帝君命籍太一勒生上玄下黄三宫肅清九孔受眞萬神和寧乘運逥年還本𥘉形與氣俱昇與神俱生飛行玄虚上造帝庭畢又咽氣九過咽液二十四過止行此三年錬腸益氣逆覩未然九年骨輕白日飛昇十二月則受梵寳天之氣當以其月三日平旦十三日正中二十三日夜半一月三日三時香湯沐浴燒香入室西北九拜朝元父東南三拜朝玄母還向月建平坐叩齒三十六通閉眼存呼梵寳天王姓精諱霧雲衣九色流雲飛晨之裘頭戴流丹絳冠熒星玄精之冠乘流霞丹霄瓊輿羽蓋從上宫玉仙十二人來下入兆身洞天明堂之中存見紫色之雲氣鬱鬱冠帀兆形良久仍口引雲氣九咽㣲祝曰九丹流精結化自然元父玄降玄母敷陳帝君監靈太一鎭眞司命勤籍東華記仙飛英皇芝流灌形身八景九氣錬化胞根三宫結絡九孔納新神聦幽關内覩無間體化形變與氣同煙乘空駕虚飛昇帝晨畢又咽氣九過咽液二十四過止行此三年骨化成玉神歡氣盈逆知方來未然之事九年形變飛行太空正月受化應聲天之氣當以其月四日平且十四日正中二十四日夜半一月三日三時香湯沐浴入室燒香西北九拜朝元父東南三拜朝玄母還向月建平坐叩齒三十六通閉眼存呼化應聲天王姓耀諱衣九色流光耀雲錦裘頭戴白光太白玉精之冠乘飛鳳遊霄紫輪從太眞玉仙三十六人來下入兆身華蓋宫中存見白色雲氣鬱鬱冠帀兆身良乆仍口引雲氣九咽㣲祝曰三合成一九變結神上開下張二景纏綿隂陽内昌以降我身氣禀九靈名題髙晨三宫紫絡法挺自然内外洞逹骨化成仙返氣降靈總具萬神飛衣羽服運我昇晨畢咽氣九過咽液二十四過止行此三年肺化成金面有玉容九年神降白日飛騰二月受不驕樂天之氣當以其月五日平日十五日正中二十五日夜半一月三日三時香湯沐浴入室燒香西北九拜朝元父東南三拜朝玄母還向月建平生叩齒三十六通閉眼存呼不驕樂天王姓凝諱䨱衣九色飛霜雲文斑裘頭戴青華嵗星玄精之冠乗白鹿丹霞之輿從上宫玉仙二十六人來下入兆身紫㣲宫中存見青色之雲氣冠帀兆形良火仍口引雲氣九咽㣲祝曰三合成綱二靈交泰九眞流降日月翼靄七星玄映五宿廻蓋三關朗耀萬神冠帶九孔清通六府受漑内昌表逸洞覩无外長保天地永享四大畢咽氣九過咽液九過止行此三年肝結紫絡玉秀内發洞明表裏逆覩未然九年靈降飛昇九天三月受寂然天之氣當以其月六日平旦十六日正中二十六日夜半一月三日三時香湯沭浴入室燒香向西北九拜朝元父東南三拜朝玄母還向月建平坐叩齒三十六通閉眼存呼寂然天王姓津諱衣七色龍文通光之裘頭戴隂精夜光之冠乗八景飛輪從玉仙十二人下入兆身長命宫中存見碧色之雲氣鬱鬱冠帀兆形良乆仍口引雲氣九咽㣲祝曰至道冥冥玄氣潜分九五演流八㑹命門丹宫赤子受氣帝君桃康命籍列奏三元衆眞監映錬魄寳魂内鮮外光靈鎭幽關八景翼軀九氣降靈飛騰玄虚昇造帝門畢咽氣九過咽液九過止如此三年膽化玉霜内結紫煙九孔納靈與赤子共言九年得乘玄雲紫蓋上昇九天四月受須延天之氣當以其月七日平旦十七日五中二十七日夜半一月三日三時香湯沐浴入室燒香向西北九拜朝元父東南三拜朝玄母還向月建平坐叩齒三十六通閉眼存呼須延天王姓滓諱衣九色三法雲文之裘頭戴天元寳明之冠乘九色飛鴻三素飛雲從素靈玉女二十四人來下入兆身黄庭宫中存見黄氣之雲鬱鬱冠帀兆形良乆仍口引雲氣九咽㣲祝曰三魂巳安七魄巳寧天布五宿身法七星萬神侍翼玄眞吐靈玉芝流注洞灌五形内充外溢幽關朗清還容錬髓返白爲青縱景變化出幽入冥乘虚飛空上造月庭畢咽氣九過咽液九過止如此三年則脾化成金體發金精得覩五藏與入景交言九年飛行上昇玉清五月受上上禪善无量夀天之氣當以其月八日平旦十八日正中二十八日夜半一月三日三時香湯沐浴入室燒香向西北九拜朝元父東南三拜朝玄母還向日建平坐叩齒三十六通閉眼思上上禪善无量夀天王姓禊諱衣九色雲文之裘頭戴暉精月光之冠乘十二玄龜飛青羽蓋從上宫太仙玉童三十二人下入兆身𩀱合宫中存見紫色之雲氣鬱鬱冠帀兆形良乆仍口引雲氣九咽徴呪曰八景羅位萬神齊排五藏結華九孔朗開心變成王骨化塵飛霞裙翼翼羽帔霏霏内眞浪浪飛青羽衣雲輪紫蓋瓊輿來歸運仙導飛宛轉徘徊請我飛昇上造太㣲畢咽炁九過咽液九過止如地三年腎化結仙舉形備爲三元下降白日昇天六月受鬱單尢量天之氣當以其月九日平旦十九日王中二十九日夜半一月三日三時香湯沐浴入室燒皆西北九拜朝元父東南三拜朝玄母還向月建平坐叩齒三十六通閉眼思鬱單无量天王姓混諱霜衣九色無縫自然斑文之裘頭戴耀精日圎之冠乘九麟瓊輪從玉仙二十四人下入兆身絳宫之中存見赤色之雲氣鬱鬱冠市兆形良乆仍口引雲氣九咽徴祝曰九天之氣氣已滿充妄置八景羅列三宫萬神備位靈眞交通司命定録太一扶將三五齊整運覩太陽三變九轉返我帝郷金輿瓊蓋夾引玉光來降我身安我金堂與我相保與我同翔騰飛太玄上宴帝房畢咽氣九過咽液九過止如此三年心生王華萬氣變仙覩幽察冥與神共言九年得乘八景飛行上清從十月結胎至六月受九天之氣已滿至七月合十月天地氣盈受太陽之運而生當以七月十日平旦二十日正中三十日夜半一月三日三睛香湯沐浴入室燒香西北向九拜轉東南向三拜還向本命上平坐叩齒三十六通思九天元父諱遵囬從天西北夾下入兆身泥丸之中玄母諱沌還從天東南來下入兆身丹田命門之中元父化爲青氣玄母化爲黄氣青氣從泥丸中下黄氣從命門中上二氣合㑹絳宫中二氣混黄更相纒繞須㬰青氣化爲嬰兒黄氣化爲鳳皇鳳皇口㘅九丹流精保命之符以哺嬰兒之口嬰兒受符畢化爲圎日還出頭上鳯皇化爲月景還下命門之中日月二光遥相映照洞逹一身因引日精八十一咽引月光四十五咽止㣲祝曰上化幽冥耀形太陽二氣交合同㑹絳宫元化嬰兒玄化鳳皇乍離乍合九變混黄日月對䖏上下交通左部帝靈右翼桃康白元无英安守洞房萬神齊景濟濟洋洋昇降流精内結玉光表裏羽儀龍輿來迎飛行玄虚上昇太空畢便服九丹流精保命之符記又咽氣九過咽液九過止如此三年眞人見形而有金容體生竒光九年飛騰白日昇天也九丹流精保命之符青書竹膜上向本命三時服三枚此通腹錬髓化骨結神三年舉體同化也服符先祝曰天降地昇二氣交隆九丹變化結精中房八景散靈六府内昌萬神齊清長享太陽終天極地歡樂未央畢服符竟咽九氣止也凡修此道皆當計受胎月數隨月行事竟十月都止也此胎精中記學仙之本根求生之淵源學无此道徒勞自勤无益於形神也形不被錬結根不斷眞神遊散雖有雲輿來降形亦不能自飛也至祕之道愼告非眞盟科考重殃累子身宻修苦念尅得上仙白日飛騰也若不知結胎之月當以本命之辰爲胎月而行之也假令本命寅生正月便爲胎月也他即効之九丹上化胎精中記一名瓊胎靈曜乃生九玄之𥘉結太空自然之氣以成寳文二十四眞三十九帝悉所修行太帝君以傳南極夫人南極夫人以傳太㣲天帝君太㣲天帝君以傳後聖金闕帝君金闕帝君以傳上相青童君青童君更撰集施用上下次第付西城眞人西王母今封一通於灜洲方丈依科七千年有骨相合仙名書帝籙之人得傳今有其人七百年中聽得三傳有得其文給玉童玉女各九人侍衛典者營護有經者身輕慢靈文傳非其人泄露天眞七伹父母充責三官運石摙山萬劫不原巳身被考長閉地獄不得入仙授經師與弟子對齋九十日或三十日齎上金一斤白絹八十尺丹一斤以代列誓之信北向跪盟而傳不得輕傳无盟无信而修其道殃延七玄巳身充責負罪幽夜萬劫不原學者明慎慎勿妄宣上清九丹上化胎精中記經
